name: turf_war
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+3

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  audioplayers: ^6.1.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.2.0
  image_picker: ^1.2.1
  firebase_storage: ^13.2.0 # 🟢 الإضافة الأولى: رفع الصور
  cached_network_image: ^3.4.1 # 🟢 الإضافة الثانية: الذاكرة المؤقتة للصور
  awesome_notifications: ^0.11.0
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  rename: ^3.1.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/ui/
    - assets/images/icons/
    - assets/images/backgrounds/
    - assets/audio/
  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-Regular.ttf
        - asset: assets/fonts/Changa-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.jpg"
  min_sdk_android: 21